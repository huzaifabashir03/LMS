version: "3.8"

services:
  mongodb:
    image: mongo:7.0-alpine
    container_name: mern_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DB: smart_student_portal
    volumes:
      - mongo_data:/data/db
    networks:
      - mern_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: mern_backend
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://admin:password123@mongodb:27017/smart_student_portal
      JWT_SECRET: dev_secret_key_change_in_production
      EMAIL_USER: your_email@gmail.com
      EMAIL_PASS: your_app_password
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: development
      PORT: 5000
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules
    networks:
      - mern_network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: mern_frontend
    ports:
      - "3000:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    networks:
      - mern_network
    command: npm run dev -- --host

volumes:
  mongo_data:

networks:
  mern_network:
    driver: bridge
